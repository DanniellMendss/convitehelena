  <style>
    *, *::before, *::after {
      margin: 0;

      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
    }

    .canva-container {
      position: relative;
      width: 100%;
      height: 0;
      padding-top: 177.7778%;
      padding-bottom: 0;
      box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16);
      overflow: hidden;
      border-radius: 8px;
      will-change: transform;
    }

    .canva-container iframe {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      border: none;
      padding: 0;
      margin: 0;

    .canva-credit {
      position: fixed;

      width: 100%;

      color: rgba(255, 255, 255, 0.5);
    }

    .canva-credit a {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
    }

    .canva-credit a:hover {
      text-decoration: underline;
    }
